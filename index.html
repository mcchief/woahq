<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WOA Intelligence Dashboard V7</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--bg:#06111f;--panel:rgba(255,255,255,.07);--panel2:rgba(255,255,255,.105);--line:rgba(148,197,253,.24);--text:#f7fbff;--muted:#b8d7f5;--good:#38d996;--bad:#ff6b7d;--warn:#facc15;--info:#38bdf8;--purple:#a78bfa;--radius:22px;--shadow:0 24px 70px rgba(0,0,0,.36)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(56,189,248,.24),transparent 30%),radial-gradient(circle at top right,rgba(167,139,250,.19),transparent 28%),linear-gradient(135deg,#06111f,#0b1f36 52%,#102a44);min-height:100vh}button,input,select{font:inherit}.wrap{width:min(1780px,calc(100% - 22px));margin:auto;padding:12px 0 42px}.glass{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(16px);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}.top{display:grid;grid-template-columns:auto 1fr auto auto;gap:12px;align-items:end;padding:12px}.brand{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.07);font-weight:900;letter-spacing:.04em;text-transform:uppercase;font-size:12px;white-space:nowrap}.dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--good),var(--info));box-shadow:0 0 18px rgba(56,189,248,.9)}
.header-search{min-width:320px}.searchbox{display:grid;grid-template-columns:1fr 116px;gap:8px}.input,.select,.btn{width:100%;min-height:44px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:#fff;padding:0 12px;outline:none}.select option{background:#0b1f36;color:#fff}.btn{cursor:pointer;font-weight:900;background:linear-gradient(135deg,rgba(56,189,248,.22),rgba(167,139,250,.18))}.btn:hover,.tab:hover{filter:brightness(1.1)}label{display:block;font-size:11px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}.msg{font-size:12px;color:#ffe68a;font-weight:800;margin-top:5px;min-height:14px}
.hero{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;padding:20px}h1{font-size:clamp(32px,3.8vw,58px);line-height:.98;margin:8px 0;letter-spacing:-.055em}h2,h3{margin:0;font-weight:900;letter-spacing:-.02em}.hero p,.sub{margin:4px 0 0;color:var(--muted);font-size:13px;line-height:1.55}.hero-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.mini,.kpi,.card{border-radius:18px;background:rgba(255,255,255,.055);border:1px solid var(--line);padding:14px}.label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:900}.value{font-weight:900;font-size:clamp(22px,2.3vw,34px);line-height:1;margin-top:10px;letter-spacing:-.04em}.note{font-size:12px;color:#d7ebff;margin-top:8px;line-height:1.5;font-weight:700}.tabs{display:flex;gap:8px;flex-wrap:wrap;padding:14px 16px}.tab{border:1px solid var(--line);background:rgba(255,255,255,.055);color:#fff;border-radius:999px;padding:10px 14px;font-weight:900;cursor:pointer}.tab.active{background:linear-gradient(135deg,rgba(56,189,248,.36),rgba(167,139,250,.3));border-color:rgba(147,197,253,.55)}.toolbar{display:grid;grid-template-columns:280px 160px 1fr;gap:10px;padding:0 16px 16px;align-items:end}.kpis{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:12px;margin-bottom:12px}.kpi.good{background:linear-gradient(180deg,rgba(26,77,65,.72),rgba(14,38,36,.78))}.kpi.bad{background:linear-gradient(180deg,rgba(95,34,48,.72),rgba(43,17,24,.82))}.kpi.warn{background:linear-gradient(180deg,rgba(92,67,28,.72),rgba(40,30,15,.82))}.kpi.info{background:linear-gradient(180deg,rgba(14,116,144,.70),rgba(12,74,110,.80))}.kpi.purple{background:linear-gradient(180deg,rgba(88,28,135,.72),rgba(59,7,100,.82))}.content-head{padding:16px 18px}.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.chartbox{height:330px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.035);padding:10px}.chartbox.tall{height:400px}.intel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}.panel-head{padding:14px 16px 0;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.panel-body{padding:14px 16px 16px}.chip{display:inline-flex;align-items:center;justify-content:center;min-height:30px;padding:0 11px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.06);font-size:11px;font-weight:900;color:#eaf7ff}.table-wrap{overflow:auto;border-top:1px solid var(--line);max-height:560px}table{width:100%;border-collapse:collapse;min-width:980px}th{position:sticky;top:0;background:#0b1f36;color:#f0f8ff;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:12px;border-bottom:1px solid rgba(255,255,255,.14);z-index:2;white-space:nowrap}td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,.065);font-size:13px;white-space:nowrap;vertical-align:middle}tr:hover{background:rgba(255,255,255,.045)}.player{font-weight:900;color:#fff;cursor:pointer;text-decoration:none}.player:hover{color:#bae6fd}.badge{display:inline-flex;min-height:24px;align-items:center;justify-content:center;border-radius:999px;padding:0 9px;font-size:10px;font-weight:900;letter-spacing:.04em;border:1px solid transparent}.met,.active{color:#9ff0c7;background:rgba(56,217,150,.13);border-color:rgba(56,217,150,.25)}.fail,.left{color:#ffb6c0;background:rgba(255,107,125,.13);border-color:rgba(255,107,125,.25)}.warnb{color:#ffe68a;background:rgba(250,204,21,.14);border-color:rgba(250,204,21,.24)}.list{list-style:none;margin:0;padding:0}.list li{display:grid;grid-template-columns:minmax(0,1fr) 110px 100px;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:13px}.empty{padding:22px;border:1px dashed var(--line);border-radius:18px;color:#d7ebff;background:rgba(255,255,255,.035);line-height:1.6}.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(3,8,18,.78);backdrop-filter:blur(8px);z-index:999;padding:14px}.modal.show{display:flex}.modal-card{width:min(1320px,100%);max-height:94vh;overflow:hidden;border-radius:24px;border:1px solid rgba(255,255,255,.14);background:linear-gradient(180deg,rgba(14,27,50,.985),rgba(8,18,36,.985));box-shadow:0 26px 80px rgba(0,0,0,.5)}.modal-head{display:flex;justify-content:space-between;gap:12px;padding:18px 20px 12px;border-bottom:1px solid rgba(255,255,255,.08)}.modal-title{font-size:26px}.modal-body{padding:16px 20px 20px;overflow:auto;max-height:calc(94vh - 88px)}.close{width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:#fff;font-size:22px;font-weight:900;cursor:pointer}.profile-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}.profile-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 14px}.profile-tabs .tab{padding:8px 12px}.status-line{font-size:12px;color:#d7ebff}.hide{display:none!important}
@media(max-width:1350px){.top{grid-template-columns:1fr}.hero,.chart-grid{grid-template-columns:1fr}.hero-cards{grid-template-columns:repeat(2,1fr)}.kpis{grid-template-columns:repeat(4,1fr)}.intel-grid{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr 1fr}.profile-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:760px){.wrap{width:min(100% - 10px,1780px)}.hero-cards,.kpis,.toolbar,.profile-grid{grid-template-columns:1fr}.searchbox{grid-template-columns:1fr}h1{font-size:34px}table{min-width:860px}}
</style>
</head>
<body>
<div class="wrap">
  <section class="top glass">
    <div class="brand"><span class="dot"></span> <span id="clanName">WOA Intelligence Dashboard V7</span></div>
    <div class="header-search"><label for="search">Player Search</label><div class="searchbox"><input class="input" id="search" list="suggestions" placeholder="Search player name..." autocomplete="off"><button class="btn" id="searchBtn">Search</button></div><datalist id="suggestions"></datalist><div class="msg" id="searchMsg"></div></div>
    <div><label for="eventSelect">Event / Week</label><select class="select" id="eventSelect"></select></div>
    <div><label for="gFilter">G-Level</label><select class="select" id="gFilter"><option value="">All G-Levels</option></select></div>
  </section>
  <section class="hero glass">
    <div><div class="brand"><span class="dot"></span> Production Live Dashboard</div><h1>WoA Intelligence Platform</h1><p>Executive dashboard for Growth, Tinman, Dark Omens, Trials of Olympus, Ragnarök and Vaults. Data loads from published Google Sheets CSV links.</p></div>
    <div class="hero-cards" id="heroCards"></div>
  </section>
  <section class="glass"><div class="tabs" id="tabs"></div></section>
  <main id="app"></main>
</div>
<div class="modal" id="modal"><div class="modal-card"><div class="modal-head"><div><h2 class="modal-title" id="modalTitle">Player Profile</h2><p class="sub" id="modalSub">Universal player performance profile.</p></div><button class="close" id="closeModal">×</button></div><div class="modal-body"><div class="profile-grid" id="profileGrid"></div><div class="profile-tabs" id="profileTabs"></div><div id="profileContent"></div></div></div></div>
<script>
const CONFIG={
 settings:'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4bZoxoTpt9p_gLtADHomURf6WIx1ETRUv_aNxPPPmCJ8bFLDHIE0k_F3fnO3w_w/pub?gid=1335739305&single=true&output=csv',
 members:'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4bZoxoTpt9p_gLtADHomURf6WIx1ETRUv_aNxPPPmCJ8bFLDHIE0k_F3fnO3w_w/pub?gid=559489060&single=true&output=csv',
 eventSetup:'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4bZoxoTpt9p_gLtADHomURf6WIx1ETRUv_aNxPPPmCJ8bFLDHIE0k_F3fnO3w_w/pub?gid=1431921579&single=true&output=csv',
 tinman:'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4bZoxoTpt9p_gLtADHomURf6WIx1ETRUv_aNxPPPmCJ8bFLDHIE0k_F3fnO3w_w/pub?gid=258895006&single=true&output=csv',
 darkOmens:'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4bZoxoTpt9p_gLtADHomURf6WIx1ETRUv_aNxPPPmCJ8bFLDHIE0k_F3fnO3w_w/pub?gid=2084234436&single=true&output=csv',
 vaults:'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4bZoxoTpt9p_gLtADHomURf6WIx1ETRUv_aNxPPPmCJ8bFLDHIE0k_F3fnO3w_w/pub?gid=909097815&single=true&output=csv',
 trials:'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4bZoxoTpt9p_gLtADHomURf6WIx1ETRUv_aNxPPPmCJ8bFLDHIE0k_F3fnO3w_w/pub?gid=754348994&single=true&output=csv',
 ragnarok:'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4bZoxoTpt9p_gLtADHomURf6WIx1ETRUv_aNxPPPmCJ8bFLDHIE0k_F3fnO3w_w/pub?gid=2089567332&single=true&output=csv',
 growth:'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4bZoxoTpt9p_gLtADHomURf6WIx1ETRUv_aNxPPPmCJ8bFLDHIE0k_F3fnO3w_w/pub?gid=1546338775&single=true&output=csv',
 growthAnalysis:'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4bZoxoTpt9p_gLtADHomURf6WIx1ETRUv_aNxPPPmCJ8bFLDHIE0k_F3fnO3w_w/pub?gid=747211407&single=true&output=csv',
 playerStatusHistory:'https://docs.google.com/spreadsheets/d/e/2PACX-1vR4bZoxoTpt9p_gLtADHomURf6WIx1ETRUv_aNxPPPmCJ8bFLDHIE0k_F3fnO3w_w/pub?gid=1978636354&single=true&output=csv'
};
const MODULES=[['overview','🏠 Overview'],['growth','📈 Growth'],['tinman','⚔ Tinman'],['darkOmens','🌑 Dark Omens'],['trials','🏛 Trials'],['ragnarok','🪓 Ragnarök'],['vaults','🏰 Vaults']];
const state={module:'overview',selected:'',g:'',profileTab:'summary',data:{settings:[],members:[],eventSetup:[],growth:[],growthAnalysis:[],tinman:[],darkOmens:[],trials:[],ragnarok:[],vaults:[],playerStatusHistory:[]},charts:{},player:''};
const $=id=>document.getElementById(id);const clean=s=>(s??'').toString().trim();const key=s=>clean(s).toUpperCase().replace(/\s+/g,'');const num=v=>{let n=parseFloat(clean(v).replace(/,/g,''));return isNaN(n)?0:n};const fmt=n=>Number(n||0).toLocaleString();const pct=(a,b)=>b?((a/b)*100).toFixed(1)+'%':'0%';
function parseCSV(text){const rows=[];let row=[],cur='',q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c==='"'&&q&&n==='"'){cur+='"';i++}else if(c==='"'){q=!q}else if(c===','&&!q){row.push(cur);cur=''}else if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&n==='\n')i++;row.push(cur);if(row.some(x=>clean(x)!==''))rows.push(row);row=[];cur=''}else cur+=c}row.push(cur);if(row.some(x=>clean(x)!==''))rows.push(row);if(!rows.length)return[];const h=rows.shift().map(clean);return rows.map(r=>Object.fromEntries(h.map((x,i)=>[x,clean(r[i])]))) }
async function loadCSV(name,url){try{const res=await fetch(url,{cache:'no-store'});if(!res.ok)throw new Error(res.status);return parseCSV(await res.text())}catch(e){console.warn('CSV failed',name,e);return []}}
async function init(){renderShell();await Promise.all(Object.entries(CONFIG).map(async([k,u])=>state.data[k]=await loadCSV(k,u)));normalizeData();setupControls();renderAll()}
function normalizeData(){state.data.members=state.data.members.map(m=>({...m,_name:field(m,['Official Player Name','Player Name','Name']),_g:field(m,['Current G-Level','G-Level','G Level']),_might:num(field(m,['Current Might','Might'])),_vault:num(field(m,['Current Vault Level','Vault Level'])),_status:field(m,['Current Status','Status'])||'Active'})).filter(m=>m._name);['tinman','darkOmens','trials','ragnarok','vaults'].forEach(k=>state.data[k]=state.data[k].map(r=>({...r,_name:field(r,['Player Name','Official Player Name','Name','Player']),_event:field(r,['Event Date','Date','Week']),_g:field(r,['G-Level','G Level','Current G-Level']),_target:num(field(r,['Target','Required','Minimum'])),_score:num(field(r,['Result / Score','Score','Points','Essence','Result','Value'])),_rank:num(field(r,['Rank'])),_vault:num(field(r,['Vault Level','Current Vault Level'])),_built:field(r,['Built','Build Status'])})).filter(r=>r._name));state.data.growth=state.data.growth.map(r=>({...r,_name:field(r,['Player Name','Player','Official Player Name','Name']),_week:field(r,['Week','Week Start','Event Date','Date']),_might:num(field(r,['Might','Current Might','Total Might']))})).filter(r=>r._name&&r._week)}
function field(o,names){for(const n of names){if(o&&Object.prototype.hasOwnProperty.call(o,n)&&clean(o[n])!=='')return clean(o[n])}return''}
function activeMembers(){return state.data.members.filter(m=>!/(left|inactive|removed)/i.test(m._status))}
function memberByName(n){const k=key(n);return state.data.members.find(m=>key(m._name)===k)||state.data.members.find(m=>key(m._name).includes(k))}
function memberG(name){return memberByName(name)?._g||''}
function filteredRows(rows){return state.g?rows.filter(r=>(r._g||memberG(r._name))===state.g):rows}
function selectedRows(rows){let r=filteredRows(rows);if(state.selected)r=r.filter(x=>(x._event||x._week)===state.selected);return r}
function renderShell(){const tabs=$('tabs');tabs.innerHTML=MODULES.map(m=>`<button class="tab ${m[0]===state.module?'active':''}" data-module="${m[0]}">${m[1]}</button>`).join('');tabs.onclick=e=>{if(e.target.dataset.module){state.module=e.target.dataset.module;state.selected='';renderAll()}};$('searchBtn').onclick=doSearch;$('search').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});$('closeModal').onclick=()=>$('modal').classList.remove('show');$('gFilter').onchange=e=>{state.g=e.target.value;renderAll()};$('eventSelect').onchange=e=>{state.selected=e.target.value;renderAll()}}
function setupControls(){const gs=[...new Set(state.data.members.map(m=>m._g).filter(Boolean))].sort();$('gFilter').innerHTML='<option value="">All G-Levels</option>'+gs.map(g=>`<option>${g}</option>`).join('');$('suggestions').innerHTML=state.data.members.map(m=>`<option value="${esc(m._name)}"></option>`).join('')}
function renderAll(){renderShell();renderHero();renderEventSelector();destroyCharts();({overview:renderOverview,growth:renderGrowth,tinman:()=>renderEventModule('tinman','Tinman','Points'),darkOmens:()=>renderEventModule('darkOmens','Dark Omens','Essence'),trials:()=>renderEventModule('trials','Trials of Olympus','Points'),ragnarok:()=>renderEventModule('ragnarok','Ragnarök','Score'),vaults:renderVaults}[state.module])()}
function renderHero(){const members=state.data.members, active=activeMembers(), totalMight=active.reduce((a,m)=>a+m._might,0), weeks=[...new Set(state.data.growth.map(r=>r._week))];$('heroCards').innerHTML=kpiHtml([['Total Members',members.length],['Active Players',active.length],['Clan Might',short(totalMight)],['Growth Weeks',weeks.length]])}
function renderEventSelector(){let vals=[];if(state.module==='growth'||state.module==='overview')vals=[...new Set(state.data.growth.map(r=>r._week))].sort();else vals=[...new Set((state.data[state.module]||[]).map(r=>r._event))].sort();if(!state.selected||!vals.includes(state.selected))state.selected=vals.at(-1)||'';$('eventSelect').innerHTML='<option value="">All</option>'+vals.map(v=>`<option ${v===state.selected?'selected':''}>${esc(v)}</option>`).join('')}
function kpiHtml(items){return items.map((x,i)=>`<div class="kpi ${['info','good','purple','warn','bad'][i%5]}"><div class="label">${x[0]}</div><div class="value">${x[1]}</div><div class="note">${x[2]||''}</div></div>`).join('')}
function card(title,sub,body,chip=''){return `<section class="glass"><div class="panel-head"><div><h3>${title}</h3><p class="sub">${sub||''}</p></div>${chip?`<span class="chip">${chip}</span>`:''}</div><div class="panel-body">${body}</div></section>`}
function renderOverview(){const a=activeMembers(), members=state.data.members, total=a.reduce((s,m)=>s+m._might,0), avg=a.length?total/a.length:0, high=Math.max(0,...a.map(m=>m._might));$('app').innerHTML=`<section class="content-head glass"><h2>Overview</h2><p class="sub">Executive clan summary.</p></section><section class="kpis">${kpiHtml([['Total Clan Might',short(total)],['Active Players',a.length],['Total Players',members.length],['Average Might',short(avg)],['Highest Might',short(high)],['Weekly Growth',short(weeklyGrowth().total)],['Joined',weeklyGrowth().joined],['Left',weeklyGrowth().left]])}</section><section class="chart-grid"><div class="glass"><div class="panel-head"><h3>G-Level Distribution</h3></div><div class="panel-body"><div class="chartbox"><canvas id="c1"></canvas></div></div></div><div class="glass"><div class="panel-head"><h3>Clan Might Trend</h3></div><div class="panel-body"><div class="chartbox"><canvas id="c2"></canvas></div></div></div></section>${tableCard('Top 10 Strongest Players',a.sort((x,y)=>y._might-x._might).slice(0,10),['Player','G-Level','Might','Vault Level'],r=>[pLink(r._name),r._g,fmt(r._might),r._vault])}`;chartPie('c1',groupCount(a,'_g'));chartLine('c2',growthTrend())}
function renderGrowth(){const weeks=[...new Set(state.data.growth.map(r=>r._week))].sort(), latest=state.selected||weeks.at(-1), prev=weeks[weeks.indexOf(latest)-1], latestRows=state.data.growth.filter(r=>r._week===latest), prevMap=Object.fromEntries(state.data.growth.filter(r=>r._week===prev).map(r=>[key(r._name),r._might]));let analysis=latestRows.map(r=>{let p=prevMap[key(r._name)]||0,chg=p?r._might-p:0;return {...r,_g:memberG(r._name),_change:chg,_pct:p?chg/p*100:0,_total:totalGrowth(r._name)}});analysis=filteredRows(analysis).filter(r=>r._might);const wg=weeklyGrowth();$('app').innerHTML=`<section class="content-head glass"><h2>Growth</h2><p class="sub">Clan growth analytics using Growth Raw Data.</p></section><section class="kpis">${kpiHtml([['Total Clan Might',short(latestRows.reduce((s,r)=>s+r._might,0))],['Active Players',activeMembers().length],['Weekly Growth',short(wg.total)],['Average Weekly Growth',short(analysis.length?analysis.reduce((s,r)=>s+r._change,0)/analysis.length:0)],['Joined',wg.joined],['Left',wg.left],['Returned',wg.returned],['Below 200M',analysis.filter(r=>r._might<200000000).length]])}</section><section class="chart-grid"><div class="glass"><div class="panel-head"><h3>Clan Might Trend</h3><p class="sub">Historic weekly total might progression.</p></div><div class="panel-body"><div class="chartbox"><canvas id="c1"></canvas></div></div></div><div class="glass"><div class="panel-head"><h3>Top 10 Players by Selected Week</h3><p class="sub">This ranking changes with the selected week.</p></div><div class="panel-body"><div class="chartbox"><canvas id="c2"></canvas></div></div></div><div class="glass"><div class="panel-head"><h3>Top 10 Weekly Gains</h3></div><div class="panel-body"><div class="chartbox"><canvas id="c3"></canvas></div></div></div><div class="glass"><div class="panel-head"><h3>Top 10 Growers (All Time)</h3><p class="sub">Highest growth across tracked weeks.</p></div><div class="panel-body"><div class="chartbox"><canvas id="c4"></canvas></div></div></div></section><section class="intel-grid">${listCard('Development Focus',analysis.filter(r=>r._change<=0).slice(0,10),'Growth Risk')}${listCard('Highest Improvers',[...analysis].sort((a,b)=>b._change-a._change).slice(0,10),'Improvers')}${listCard('Highest Decliners',[...analysis].sort((a,b)=>a._change-b._change).slice(0,10),'Decliners')}</section>${tableCard('Player Analysis by Selected Week',analysis.sort((a,b)=>b._might-a._might),['Player','G-Level','Current Might','Weekly Growth','Total Growth','Growth %','Rank'],(r,i)=>[pLink(r._name),r._g,fmt(r._might),fmt(r._change),fmt(r._total),r._pct.toFixed(1)+'%',i+1])}`;chartLine('c1',growthTrend());chartBar('c2',topObj(analysis,'_name','_might',10));chartBar('c3',topObj(analysis,'_name','_change',10));chartBar('c4',topObj(state.data.growth.map(r=>({...r,_total:totalGrowth(r._name)})),'_name','_total',10,true))}
function renderEventModule(k,title,scoreLabel){const rows=selectedRows(state.data[k]).filter(r=>r._score||r._target||r._rank);const participants=rows.length,total=rows.reduce((s,r)=>s+r._score,0),avg=participants?total/participants:0,high=Math.max(0,...rows.map(r=>r._score)),met=rows.filter(r=>r._score>=r._target).length,below=rows.filter(r=>r._score<r._target).length;$('app').innerHTML=`<section class="content-head glass"><h2>${title}</h2><p class="sub">Event analytics and leadership intelligence.</p></section><section class="kpis">${kpiHtml([['Participation',participants],['Participation %',pct(participants,activeMembers().length)],['Total '+scoreLabel,short(total)],['Average '+scoreLabel,short(avg)],['Highest '+scoreLabel,short(high)],['Meeting Target',met],['Below Target',below],['Completion %',pct(met,participants)]])}</section><section class="chart-grid"><div class="glass"><div class="panel-head"><h3>Top 10 ${scoreLabel}</h3></div><div class="panel-body"><div class="chartbox"><canvas id="c1"></canvas></div></div></div><div class="glass"><div class="panel-head"><h3>G-Level Performance</h3></div><div class="panel-body"><div class="chartbox"><canvas id="c2"></canvas></div></div></div><div class="glass"><div class="panel-head"><h3>Target Achievement</h3></div><div class="panel-body"><div class="chartbox"><canvas id="c3"></canvas></div></div></div><div class="glass"><div class="panel-head"><h3>Participation Trend</h3></div><div class="panel-body"><div class="chartbox"><canvas id="c4"></canvas></div></div></div></section><section class="intel-grid">${listCard('Underperformers',rows.filter(r=>r._score<r._target).sort((a,b)=>(a._score-a._target)-(b._score-b._target)).slice(0,10),'Below Target')}${listCard('Repeat Underperformers',repeatUnder(k).slice(0,10),'Repeat Risk')}${k==='tinman'?listCard('Participation Alerts',rows.filter(r=>r._score===0).slice(0,10),'Zero Score'):''}</section>${tableCard('Player Results',rows.sort((a,b)=>b._score-a._score),['Player','G-Level','Target',scoreLabel,'Difference'],r=>[pLink(r._name),r._g||memberG(r._name),fmt(r._target),fmt(r._score),fmt(r._score-r._target)])}`;chartBar('c1',topObj(rows,'_name','_score',10));chartBar('c2',groupSum(rows,'_g','_score'));chartPie('c3',{'Met Target':met,'Below Target':below});chartLine('c4',eventTrend(state.data[k]))}
function renderVaults(){const rows=selectedRows(state.data.vaults);const built=rows.length, eligible=activeMembers().length, levels=rows.map(r=>r._vault).filter(Boolean), avg=levels.length?levels.reduce((a,b)=>a+b,0)/levels.length:0;const builtKeys=new Set(rows.map(r=>key(r._name)));const missing=activeMembers().filter(m=>!builtKeys.has(key(m._name)));$('app').innerHTML=`<section class="content-head glass"><h2>Vaults</h2><p class="sub">Vault building analytics.</p></section><section class="kpis">${kpiHtml([['Eligible Builders',eligible],['Vaults Built',built],['Missing Builders',missing.length],['Completion %',pct(built,eligible)],['Average Vault Level',avg.toFixed(1)],['Highest Vault Level',Math.max(0,...levels)],['Lowest Vault Level',levels.length?Math.min(...levels):0]])}</section><section class="chart-grid"><div class="glass"><div class="panel-head"><h3>Vault Level Distribution</h3></div><div class="panel-body"><div class="chartbox"><canvas id="c1"></canvas></div></div></div><div class="glass"><div class="panel-head"><h3>Vault Build Trend</h3></div><div class="panel-body"><div class="chartbox"><canvas id="c2"></canvas></div></div></div></section><section class="intel-grid">${listCard('Missing Builders',missing.map(m=>({_name:m._name,_g:m._g,_score:m._vault})).slice(0,20),'Missing')}${listCard('Late Builders',[...rows].sort((a,b)=>num(b['Local Build Time'])-num(a['Local Build Time'])).slice(0,10),'Late')}${listCard('Frequent Non-Builders',missing.map(m=>({_name:m._name,_g:m._g,_score:0})).slice(0,10),'Watch')}</section>${tableCard('Vault History',rows,['Player','G-Level','Vault Level','Built','Build Time'],r=>[pLink(r._name),r._g||memberG(r._name),r._vault,'Built',field(r,['Local Build Time','Build Time'])])}`;chartPie('c1',groupCount(rows,'_vault'));chartLine('c2',eventTrend(state.data.vaults))}
function tableCard(title,rows,headers,map){const body=rows.length?`<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map((r,i)=>`<tr>${map(r,i).map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`:`<div class="empty">No data available for this selection.</div>`;return card(title,'Click a player name to open full profile.',body,`${rows.length} rows`)}
function listCard(title,rows,chip){return card(title,'Leadership action list.',rows.length?`<ul class="list">${rows.map(r=>`<li><span>${pLink(r._name)}</span><span>${r._g||memberG(r._name)||''}</span><span>${fmt(r._score??r._change??r._total??0)}</span></li>`).join('')}</ul>`:`<div class="empty">No records.</div>`,chip)}
function pLink(n){return `<a class="player" onclick="openProfile('${escAttr(n)}')">${esc(n)}</a>`}
function doSearch(){const q=$('search').value.trim();const m=memberByName(q);if(m)openProfile(m._name);else $('searchMsg').textContent='Player not found.'}
function openProfile(name){state.player=name;state.profileTab='summary';renderProfile();$('modal').classList.add('show')}
function renderProfile(){const m=memberByName(state.player)||{_name:state.player};$('modalTitle').textContent=m._name;$('modalSub').textContent='Universal player performance profile';$('profileGrid').innerHTML=kpiHtml([['G-Level',m._g||memberG(m._name)||'-'],['Might',short(m._might)],['Vault Level',m._vault||'-'],['Status',m._status||'-'],['Growth',short(totalGrowth(m._name))]]);const tabs=['summary','growth','tinman','darkOmens','trials','ragnarok','vaults'];$('profileTabs').innerHTML=tabs.map(t=>`<button class="tab ${t===state.profileTab?'active':''}" onclick="state.profileTab='${t}';renderProfileContent()">${label(t)}</button>`).join('');renderProfileContent()}
function renderProfileContent(){const n=state.player,k=key(n);let html='';if(state.profileTab==='summary'){html='<div class="empty">Use the tabs above to review this player across Growth, Tinman, Dark Omens, Trials, Ragnarök and Vaults.</div>'}else if(state.profileTab==='growth'){const rows=state.data.growth.filter(r=>key(r._name)===k).sort((a,b)=>a._week.localeCompare(b._week));html=`<div class="chartbox"><canvas id="pc"></canvas></div>${tableCard('Weekly Growth History',rows,['Week','Might','Weekly Growth'],(r,i)=>[r._week,fmt(r._might),fmt(i? r._might-rows[i-1]._might:0)])}`;setTimeout(()=>chartLine('pc',Object.fromEntries(rows.map(r=>[r._week,r._might]))),0)}else{const rows=(state.data[state.profileTab]||[]).filter(r=>key(r._name)===k);html=tableCard(label(state.profileTab)+' History',rows,['Date','G-Level','Target','Score','Difference'],r=>[r._event,r._g||memberG(r._name),fmt(r._target),fmt(r._score),fmt(r._score-r._target)])}$('profileContent').innerHTML=html}
function label(k){return {darkOmens:'Dark Omens',ragnarok:'Ragnarök',vaults:'Vaults'}[k]||k[0].toUpperCase()+k.slice(1)}
function weeklyGrowth(){const weeks=[...new Set(state.data.growth.map(r=>r._week))].sort();const latest=state.selected&&weeks.includes(state.selected)?state.selected:weeks.at(-1),prev=weeks[weeks.indexOf(latest)-1];const lr=state.data.growth.filter(r=>r._week===latest),pr=state.data.growth.filter(r=>r._week===prev),pm=Object.fromEntries(pr.map(r=>[key(r._name),r._might]));let total=0,joined=0,left=0,returned=0;lr.forEach(r=>{if(pm[key(r._name)])total+=r._might-pm[key(r._name)];else joined++});const lk=new Set(lr.map(r=>key(r._name)));pr.forEach(r=>{if(!lk.has(key(r._name)))left++});return{total,joined,left,returned}}
function totalGrowth(name){const rows=state.data.growth.filter(r=>key(r._name)===key(name)).sort((a,b)=>a._week.localeCompare(b._week));return rows.length>1?rows.at(-1)._might-rows[0]._might:0}
function growthTrend(){const out={};state.data.growth.forEach(r=>out[r._week]=(out[r._week]||0)+r._might);return out}
function eventTrend(rows){const out={};rows.forEach(r=>{const d=r._event||r._week;if(d)out[d]=(out[d]||0)+1});return out}
function repeatUnder(k){const map={};state.data[k].forEach(r=>{if(r._score<r._target){const kk=key(r._name);map[kk]=map[kk]||{_name:r._name,_g:r._g,_score:0};map[kk]._score++}});return Object.values(map).sort((a,b)=>b._score-a._score)}
function groupCount(rows,prop){const o={};rows.forEach(r=>{const k=clean(r[prop])||'Unknown';o[k]=(o[k]||0)+1});return o}
function groupSum(rows,prop,val){const o={};rows.forEach(r=>{const k=clean(r[prop])||'Unknown';o[k]=(o[k]||0)+num(r[val])});return o}
function topObj(rows,labelProp,valProp,n=10,unique=false){let arr=rows.map(r=>[r[labelProp],num(r[valProp])]).filter(x=>x[0]);if(unique){const m={};arr.forEach(([a,b])=>m[a]=Math.max(m[a]||0,b));arr=Object.entries(m)}arr.sort((a,b)=>b[1]-a[1]);return Object.fromEntries(arr.slice(0,n))}
function destroyCharts(){Object.values(state.charts).forEach(c=>c.destroy&&c.destroy());state.charts={}}
function chartBar(id,obj){const el=$(id);if(!el)return;state.charts[id]=new Chart(el,{type:'bar',data:{labels:Object.keys(obj),datasets:[{label:'Value',data:Object.values(obj)}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#d7ebff'}},y:{ticks:{color:'#d7ebff'}}}}})}
function chartLine(id,obj){const el=$(id);if(!el)return;state.charts[id]=new Chart(el,{type:'line',data:{labels:Object.keys(obj),datasets:[{label:'Value',data:Object.values(obj),tension:.35,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#d7ebff'}},y:{ticks:{color:'#d7ebff'}}}}})}
function chartPie(id,obj){const el=$(id);if(!el)return;state.charts[id]=new Chart(el,{type:'doughnut',data:{labels:Object.keys(obj),datasets:[{data:Object.values(obj)}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#d7ebff'}}}}})}
function esc(s){return clean(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function escAttr(s){return esc(s).replace(/'/g,'&#39;')}function short(n){n=num(n);if(Math.abs(n)>=1e9)return(n/1e9).toFixed(2)+'B';if(Math.abs(n)>=1e6)return(n/1e6).toFixed(1)+'M';if(Math.abs(n)>=1e3)return(n/1e3).toFixed(1)+'K';return fmt(n)}
window.openProfile=openProfile;init();
</script>
</body>
