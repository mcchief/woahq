<div class="wrap"><section class="top glass"><div class="brand"><span class="dot"></span><span>WOA Intelligence Dashboard</span></div><div><label for="search">Player Search</label><div class="searchbox"><input class="input" id="search" list="suggestions" placeholder="Search player name..." autocomplete="off"><button class="btn" id="searchBtn">Search</button></div><datalist id="suggestions"></datalist><div class="msg" id="searchMsg">Synchronizing live clan data...</div></div><div><label for="eventSelect">Event / Week</label><select class="select" id="eventSelect"></select></div><div><label for="gFilter">G-Level</label><select class="select" id="gFilter"><option value="">All G-Levels</option></select></div></section><div id="warningBanner" class="warn-banner"></div><section class="hero glass"><div><div class="brand"><span class="dot"></span> Live Dashboard</div><h1>WoA Intelligence Platform</h1><p>Track clan performance, participation and player progress across all events.</p></div><div class="hero-cards" id="heroCards"></div></section><section class="glass"><div class="tabs" id="tabs"></div></section><main id="app"></main></div>

<script>
const CONFIG={
 settings:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsTT-_taEOpb6BlCTIwtt3A6euAlen5nxGRQEHsEcptqt_bW2jwdqUo5ytQDy9ig/pub?gid=16913949&single=true&output=csv',

 eventSetup:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsTT-_taEOpb6BlCTIwtt3A6euAlen5nxGRQEHsEcptqt_bW2jwdqUo5ytQDy9ig/pub?gid=1218142032&single=true&output=csv',
 growth:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsTT-_taEOpb6BlCTIwtt3A6euAlen5nxGRQEHsEcptqt_bW2jwdqUo5ytQDy9ig/pub?gid=515375380&single=true&output=csv',

 chestpoints:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsTT-_taEOpb6BlCTIwtt3A6euAlen5nxGRQEHsEcptqt_bW2jwdqUo5ytQDy9ig/pub?gid=1886099941&single=true&output=csv',
 vaults:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsTT-_taEOpb6BlCTIwtt3A6euAlen5nxGRQEHsEcptqt_bW2jwdqUo5ytQDy9ig/pub?gid=180487174&single=true&output=csv',
 playerStatusHistory:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsTT-_taEOpb6BlCTIwtt3A6euAlen5nxGRQEHsEcptqt_bW2jwdqUo5ytQDy9ig/pub?gid=465755854&single=true&output=csv'
};
const LIVE_STATUS={};
function parseCSVMatrix(text){const rows=[];let row=[],cur='',q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c==='"'&&q&&n==='"'){cur+='"';i++}else if(c==='"'){q=!q}else if(c===','&&!q){row.push(cur);cur=''}else if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&n==='\n')i++;row.push(cur);if(row.some(x=>clean(x)!==''))rows.push(row);row=[];cur=''}else cur+=c}row.push(cur);if(row.some(x=>clean(x)!==''))rows.push(row);return rows}
function canonicalHeader(s){return clean(s).toLowerCase().replace(/[^a-z0-9]+/g,' ')}
function headerScore(row){const joined=row.map(canonicalHeader).join('|');const tokens=['player name','official player name','player id','event id','event date','current g level','g level','vault level','result score','score','points','target','rank','current status','current might','week'];return tokens.reduce((a,t)=>a+(joined.includes(t)?1:0),0)}
function rowsToObjects(matrix){if(!matrix||!matrix.length)return[];let best=0,score=-1;for(let i=0;i<Math.min(12,matrix.length);i++){let sc=headerScore(matrix[i]);if(sc>score){score=sc;best=i}}let headers=matrix[best].map(h=>clean(h)||'Column');return matrix.slice(best+1).map(r=>Object.fromEntries(headers.map((h,i)=>[h,clean(r[i])]))).filter(o=>Object.values(o).some(v=>clean(v)!==''))}
function sheetMeta(url){const gid=(url.match(/[?&]gid=(\d+)/)||[])[1]||'0';const pub=(url.match(/\/d\/e\/([^/]+)\//)||[])[1];return{pub,gid}}
function loadGvizMatrix(name,url){return new Promise(resolve=>{const m=sheetMeta(url);if(!m.pub)return resolve([]);const cb='__woa_live_'+name.replace(/\W/g,'_')+'_'+Date.now();let done=false,script=null;const finish=(rows)=>{if(done)return;done=true;try{delete window[cb]}catch(e){};if(script&&script.parentNode)script.parentNode.removeChild(script);resolve(rows||[])};window[cb]=(resp)=>{try{const matrix=(resp.table.rows||[]).map(r=>(r.c||[]).map(c=>c?(c.f??c.v??''):''));finish(rowsToObjects(matrix))}catch(e){console.warn('GViz parse failed',name,e);finish([])}};script=document.createElement('script');script.onerror=()=>finish([]);script.src=`https://docs.google.com/spreadsheets/d/e/${m.pub}/gviz/tq?gid=${m.gid}&headers=0&tqx=out:json;responseHandler:${cb}`;document.body.appendChild(script);setTimeout(()=>finish([]),15000)})}
async function loadSheet(name,url){LIVE_STATUS[name]={status:'Loading',rows:0,error:''};try{const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),10000);const res=await fetch(url+'&cacheBust='+Date.now(),{cache:'no-store',signal:ctrl.signal});clearTimeout(t);if(res.ok){const txt=await res.text();if(!/^\s*</.test(txt)){const rows=rowsToObjects(parseCSVMatrix(txt));if(rows.length){LIVE_STATUS[name]={status:'Loaded',rows:rows.length,error:''};return rows}}}}catch(e){LIVE_STATUS[name]={status:'CSV failed',rows:0,error:e.message}}const rows=await loadGvizMatrix(name,url);LIVE_STATUS[name]=rows.length?{status:'Loaded',rows:rows.length,error:''}:{status:'Empty/Failed',rows:0,error:'No usable rows returned'};return rows}
function mapMember(r){return{_id:field(r,['Player ID','ID']),_name:field(r,['Official Player Name','Player Name','Name','Player']),_g:field(r,['Current G-Level','G-Level','G Level']),_vault:num(field(r,['Current Vault Level','Vault Level'])),_might:num(field(r,['Current Might','Might'])),_status:field(r,['Current Status','Status'])||'Active',_join:field(r,['Join Date','Date Joined']),_left:field(r,['Date Left','Left Date'])}}
function mapEventRow(r){return{_eventId:field(r,['Event ID','EventID']),_event:field(r,['Event Date','Date','Week']),_available:num(field(r,['Available Members','Eligible Members'])),_rank:num(field(r,['Rank'])),_name:field(r,['Player Name','Official Player Name','Name','Player']),_id:field(r,['Player ID','ID']),_g:field(r,['G-Level','G Level','Current G-Level']),_vault:num(field(r,['Vault Level','Current Vault Level'])),_might:num(field(r,['Current Might','Might'])),_target:num(field(r,['Target','Required','Minimum'])),_score:num(field(r,['Result / Score','Score','Points','Essence','Result','Value'])),_status:field(r,['Result Status','Status','Current Status']),_buildTime:field(r,['Local Build Time','Build Time']),_resetOffset:field(r,['Reset Offset']),_utcOffset:field(r,['UTC Offset']),_chests:num(field(r,['Chests','Chest Count']))}}
function mapEventSetup(r){return{_id:field(r,['Event ID','EventID']),_name:field(r,['Event Name','Name']),_type:field(r,['Event Type','Type']),_date:field(r,['Event Date','Date']),_target:num(field(r,['Target','Default Target'])),_available:num(field(r,['Available Members','Eligible Members']))}}
function mapGrowth(r){return{_name:field(r,['Player Name','Official Player Name','Name','Player']),_week:field(r,['Week','Week Start','Event Date','Date']),_might:num(field(r,['Current Might','Might','Total Might']))}}
function mapGrowthAnalysis(r){return{_name:field(r,['Player Name','Official Player Name','Name','Player']),_g:field(r,['G-Level','Current G-Level','G Level']),_growth:num(field(r,['Total Growth','Growth','All Time Growth','Weekly Growth']))}}
function mapStatusHistory(r){const ev=field(r,['Event Date','Date','Week']); return{_name:field(r,['Player Name','Official Player Name','Name','Player']),_event:ev,_eventId:field(r,['Event ID','EventID']),_eventName:field(r,['Event Name','Name','Event']),_g:field(r,['G-Level','G Level','Current G-Level']),_target:num(field(r,['Target','Required','Minimum'])),_score:num(field(r,['Result / Score','Score','Points','Essence','Result','Value'])),_status:field(r,['Status','Current Status','Result Status'])}}
async function initLive(){try{document.getElementById('searchMsg').textContent='Synchronizing live clan data...';document.getElementById('app').innerHTML='<section class="content-head glass"><h2>Loading Live Data</h2><p class="sub">Connecting to the live WoA Master Workbook.</p></section>';const raw={};await Promise.all(Object.entries(CONFIG).map(async([k,u])=>{raw[k]=await loadSheet(k,u)}));state.data={settings:raw.settings||[],members:(raw.members||[]).map(mapMember).filter(r=>r._name),eventSetup:(raw.eventSetup||[]).map(mapEventSetup).filter(r=>r._id||r._name),growthRaw:(raw.growth||[]).map(mapGrowth).filter(r=>r._name&&r._week),growthAnalysis:(raw.growthAnalysis||[]).map(mapGrowthAnalysis).filter(r=>r._name),tinman:(raw.tinman||[]).map(mapEventRow).filter(r=>r._name),darkOmens:(raw.darkOmens||[]).map(mapEventRow).filter(r=>r._name),trials:(raw.trials||[]).map(mapEventRow).filter(r=>r._name),ragnarok:(raw.ragnarok||[]).map(mapEventRow).filter(r=>r._name),chestpoints:(raw.chestpoints||[]).map(mapEventRow).filter(r=>r._name),vaults:(raw.vaults||[]).map(mapEventRow).filter(r=>r._name),playerStatusHistory:(raw.playerStatusHistory||[]).map(mapStatusHistory).filter(r=>r._name)};setupControls();renderAll();updateHealthWarnings();document.getElementById('searchMsg').textContent='Live clan data synchronized.'}catch(e){document.getElementById('app').innerHTML='<section class="content-head glass"><h2>Startup Error</h2><p class="sub">'+esc(e.message)+'</p></section>';console.error(e)}}
const MODULES=[['overview','🏠 Overview'],['growth','📈 Growth'],['tinman','⚔ Tinman'],['darkOmens','🌑 Dark Omens'],['trials','🏛 Trials'],['ragnarok','🪓 Ragnarök'],['chestpoints','🎯 Chest Points'],['vaults','🏰 Vaults']];
const state={module:'overview',selected:'',g:'',profileTab:'summary',player:'',data:{}};
const $=id=>document.getElementById(id); const clean=s=>(s??'').toString().trim(); const key=s=>clean(s).toUpperCase().replace(/\s+/g,''); const num=v=>{let n=parseFloat(clean(v).replace(/,/g,''));return isNaN(n)?0:n}; const fmt=n=>Number(num(n)||0).toLocaleString(); const pct=(a,b)=>b?((a/b)*100).toFixed(1)+'%':'0%'; const short=n=>{n=num(n); if(Math.abs(n)>=1e9)return(n/1e9).toFixed(2)+'B'; if(Math.abs(n)>=1e6)return(n/1e6).toFixed(1)+'M'; if(Math.abs(n)>=1e3)return(n/1e3).toFixed(1)+'K'; return fmt(n)}; const esc=s=>clean(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); const escAttr=s=>esc(s).replace(/'/g,'&#39;');
